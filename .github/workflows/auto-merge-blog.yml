name: Auto-merge Blog Draft PRs

# When you approve a blog/ draft PR on GitHub, it squash-merges automatically.
# The blog-publish workflow then fires on the push to main and handles LinkedIn.

on:
  pull_request_review:
    types: [submitted]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only act on blog/ branches and only when the review is an approval
    if: |
      github.event.review.state == 'approved' &&
      startsWith(github.event.pull_request.head.ref, 'blog/')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Squash-merge approved blog PR
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
