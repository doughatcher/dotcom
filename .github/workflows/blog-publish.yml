name: Publish Blog Post

# Cross-posts a new blog post to Micro.blog as a note, which then syndicates to
# configured destinations (LinkedIn, etc.). Default behavior is SITE-ONLY: the
# Micropub call only fires if the PR that introduced the post carried the
# `syndicate-linkedin` label. To opt in, add the label on the PR before merge
# (or after — see syndicate-on-label.yml for the after-the-fact path).

on:
  push:
    branches:
      - main
    paths:
      - 'content/blog/**.md'
  workflow_dispatch:
    inputs:
      post_path:
        description: "Override: cross-post a specific file (e.g. content/blog/2026-04-25-devops-matters-more-when-ai-writes-code.md)"
        required: false
        type: string
      force_syndicate:
        description: "Force-syndicate even if the source PR didn't carry syndicate-linkedin"
        required: false
        type: boolean
        default: false

jobs:
  microblog-crosspost:
    runs-on: ubuntu-latest
    # Kill switch — set the repo variable MICROBLOG_CROSSPOST_ENABLED=true to enable.
    if: ${{ vars.MICROBLOG_CROSSPOST_ENABLED == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new/changed blog post
        id: post
        run: |
          if [ -n "${{ inputs.post_path }}" ]; then
            CHANGED="${{ inputs.post_path }}"
            echo "Using manual override: ${CHANGED}"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'content/blog/*.md' \
              | grep -v '\.gitkeep' | head -1)
            echo "Found: ${CHANGED}"
          fi
          echo "path=${CHANGED}" >> $GITHUB_OUTPUT

      - name: Check source PR for syndicate-linkedin label
        id: gate
        if: steps.post.outputs.path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.force_syndicate }}" = "true" ]; then
            echo "Force-syndicate input is true — bypassing label gate"
            echo "syndicate=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Find the merge commit's source PR; read its labels.
          SHA="${{ github.sha }}"
          PR_LABELS=$(gh api "repos/${{ github.repository }}/commits/${SHA}/pulls" \
            --jq '.[0].labels[].name' 2>/dev/null || true)
          echo "Source PR labels:"
          echo "${PR_LABELS}"
          if echo "${PR_LABELS}" | grep -qx 'syndicate-linkedin'; then
            echo "✅ syndicate-linkedin label present — proceeding with cross-post"
            echo "syndicate=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️  No syndicate-linkedin label on source PR — skipping cross-post (site-only publish)"
            echo "syndicate=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.gate.outputs.syndicate == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/editorial-loop/package-lock.json

      - name: Install dependencies
        if: steps.gate.outputs.syndicate == 'true'
        run: npm ci --prefix apps/editorial-loop

      - name: Generate micro.blog note + publish
        if: steps.gate.outputs.syndicate == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MICROBLOG_APP_TOKEN: ${{ secrets.MICROBLOG_APP_TOKEN }}
          MICROBLOG_DESTINATION_UID: ${{ vars.MICROBLOG_DESTINATION_UID }}
          # Comma-separated UIDs from GET /micropub?q=syndicate-to (linkedin, mastodon, bluesky, threads).
          # Defaults to 'linkedin' if the repo variable is unset.
          MICROBLOG_SYNDICATE_TO: ${{ vars.MICROBLOG_SYNDICATE_TO || 'linkedin' }}
          POST_PATH: ${{ steps.post.outputs.path }}
          BASE_URL: https://doughatcher.com
        run: node apps/editorial-loop/publish.js

      - name: Summary
        if: steps.post.outputs.path != ''
        run: |
          echo "## micro.blog Cross-Post" >> $GITHUB_STEP_SUMMARY
          echo "Post: \`${{ steps.post.outputs.path }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.gate.outputs.syndicate }}" = "true" ]; then
            echo "Status: ✅ Cross-posted to Micro.blog → LinkedIn at $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: ⏭️ Skipped (no \`syndicate-linkedin\` label on source PR)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To syndicate this post after-the-fact: add the \`syndicate-linkedin\` label to the merged PR. The \`syndicate-on-label\` workflow will pick it up automatically." >> $GITHUB_STEP_SUMMARY
          fi
